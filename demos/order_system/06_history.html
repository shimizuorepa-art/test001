<!DOCTYPE html>
<html lang="ja">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンプル入力受付ポータル 依頼履歴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');
* { box-sizing: border-box; }
body {
  font-family:'Zen Kaku Gothic New','Hiragino Sans','Yu Gothic',sans-serif;
  margin:0; padding:0; background:#f5f7f8; color:#333;
}
.wrap { max-width:640px; margin:0 auto; padding:16px; }
h1 { font-size:20px; margin:8px 0 16px; color:#1d4ed8; }
.card { background:#fff; padding:16px; border-radius:12px;
        box-shadow:0 2px 6px rgba(0,0,0,.08); margin-bottom:12px; }
label { display:block; font-size:13px; margin:10px 0 4px; color:#555; font-weight:600; }
input {
  width:100%; padding:10px; font-size:15px;
  border:1px solid #cfd8dc; border-radius:8px; background:#fff;
  -webkit-appearance:none;
}
input:focus { outline:none; border-color:#1d4ed8; }
button {
  width:100%; padding:14px; font-size:16px; font-weight:bold;
  border:none; border-radius:10px; background:#1d4ed8; color:#fff;
  cursor:pointer;
}
button.secondary { background:#607d8b; padding:10px; font-size:14px; }
.err { color:#c62828; font-size:13px; margin-top:8px; }
.ok { color:#1d4ed8; font-size:14px; margin-top:8px; font-weight:bold; }
.hidden { display:none; }
.partner-info { background:#dbeafe; padding:10px 14px; border-radius:8px;
                font-size:14px; margin-bottom:12px; }
.partner-info b { color:#1d4ed8; }
.order-item { border-left:4px solid #1d4ed8; padding:12px 14px;
              background:#fff; border-radius:0 8px 8px 0;
              box-shadow:0 1px 3px rgba(0,0,0,.06); margin-bottom:10px; }
.order-item .date { font-size:13px; color:#1d4ed8; font-weight:bold; }
.order-item .name { font-size:15px; font-weight:bold; margin:4px 0; }
.order-item .detail { font-size:13px; color:#555; line-height:1.5; }
.order-item .actions { margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
.order-item a { display:inline-block; padding:6px 12px; background:#1d4ed8;
                color:#fff; text-decoration:none; border-radius:6px;
                font-size:12px; font-weight:bold; }
.order-item a.delivery { background:#1d4ed8; }
.order-item a.disabled { background:#ccc; pointer-events:none; }
.summary { display:flex; gap:10px; margin-bottom:12px; }
.summary > div { flex:1; background:#dbeafe; padding:10px; border-radius:8px;
                 text-align:center; font-size:13px; }
.summary b { display:block; font-size:18px; color:#1d4ed8; margin-top:4px; }
.empty { text-align:center; padding:40px 20px; color:#777; font-size:14px; }

:root {
  --hist-ink:#1a2332;
  --hist-muted:#5d6b82;
  --hist-deep:#1d4ed8;
  --hist-leaf:#3b82f6;
  --hist-sky:#1d4ed8;
  --hist-fresh:#60a5fa;
  --hist-citrus:#93c5fd;
  --hist-cream:#f1f4f8;
  --hist-card:rgba(255,255,255,.9);
  --hist-line:rgba(29,78,216,.14);
  --hist-shadow:0 22px 60px rgba(29,78,216,.12);
}
html { min-height:100%; }
body {
  min-height:100vh;
  font-family:'Zen Kaku Gothic New','Hiragino Sans','Yu Gothic',sans-serif;
  color:var(--hist-ink);
  background:
    radial-gradient(circle at 15% 6%, rgba(59,130,246,.12), transparent 28rem),
    radial-gradient(circle at 86% 2%, rgba(29,78,216,.1), transparent 28rem),
    linear-gradient(135deg, #f1f4f8 0%, #e8eef6 48%, #edf1f8 100%);
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(29,78,216,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,78,216,.04) 1px, transparent 1px);
  background-size:34px 34px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.68), transparent 78%);
}
.wrap {
  position:relative;
  z-index:1;
  max-width:760px;
  padding:clamp(18px,4vw,44px) 16px 56px;
}
.history-hero {
  position:relative;
  overflow:hidden;
  margin:6px 0 18px;
  padding:clamp(24px,5vw,36px);
  border:1px solid rgba(255,255,255,.7);
  border-radius:30px;
  background:
    radial-gradient(circle at 86% 18%, rgba(96,165,250,.3), transparent 14rem),
    linear-gradient(135deg, rgba(29,78,216,.96), rgba(59,130,246,.88));
  box-shadow:var(--hist-shadow);
  color:#fffdf7;
}
.history-hero::after {
  content:'';
  position:absolute;
  width:210px;
  height:210px;
  left:-78px;
  bottom:-128px;
  border-radius:999px;
  background:radial-gradient(circle, rgba(96,165,250,.44), transparent 68%);
}
.eyebrow {
  position:relative;
  z-index:1;
  display:inline-flex;
  margin-bottom:12px;
  padding:7px 12px;
  border:1px solid rgba(255,255,255,.3);
  border-radius:999px;
  background:rgba(255,255,255,.12);
  color:#fff4d6;
  font-size:11px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.history-hero h1 {
  position:relative;
  z-index:1;
  margin:0;
  color:#fffdf7;
  font-family:'Shippori Mincho','Yu Mincho',serif;
  font-size:clamp(31px,8vw,50px);
  line-height:1.06;
}
.hero-copy {
  position:relative;
  z-index:1;
  max-width:560px;
  margin:14px 0 0;
  color:rgba(255,253,247,.82);
  font-size:15px;
  line-height:1.8;
}
.card {
  position:relative;
  overflow:hidden;
  padding:clamp(18px,4vw,24px);
  border:1px solid var(--hist-line);
  border-radius:24px;
  background:var(--hist-card);
  box-shadow:0 14px 36px rgba(29,78,216,.08);
  backdrop-filter:blur(16px);
  animation:riseIn .42s ease both;
}
.card::before {
  content:'';
  position:absolute;
  inset:0 0 auto 0;
  height:4px;
  background:linear-gradient(90deg, var(--hist-sky), var(--hist-fresh), var(--hist-citrus));
}
@keyframes riseIn {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}
#loginBox {
  max-width:560px;
  margin:18px auto 12px;
}
label {
  margin:14px 0 6px;
  color:var(--hist-muted);
  font-size:12px;
  font-weight:900;
  letter-spacing:.04em;
}
input {
  min-height:46px;
  padding:12px 13px;
  border:1px solid rgba(33,52,45,.16);
  border-radius:14px;
  background:rgba(255,255,255,.82);
  color:var(--hist-ink);
  font-family:inherit;
  transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
}
input:focus {
  border-color:rgba(29,78,216,.72);
  box-shadow:0 0 0 4px rgba(59,130,246,.18);
  background:#fff;
}
button {
  min-height:48px;
  border-radius:16px;
  background:linear-gradient(135deg, var(--hist-deep), var(--hist-leaf));
  box-shadow:0 12px 26px rgba(29,78,216,.2);
  font-family:inherit;
  letter-spacing:.04em;
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
}
button:hover {
  transform:translateY(-1px);
  box-shadow:0 16px 34px rgba(29,78,216,.26);
  filter:saturate(1.05);
}
button:active { transform:translateY(0); }
button.secondary {
  background:linear-gradient(135deg, #53656c, #70838b);
}
.help-note {
  margin-top:16px;
  padding:12px 14px;
  border-radius:16px;
  background:rgba(255,248,234,.8);
  color:#7d6c52;
  font-size:12px;
  line-height:1.7;
}
.demo-login-hint {
  margin:10px 0 12px;
  padding:12px 14px;
  border:1px solid rgba(29,78,216,.16);
  border-radius:14px;
  background:rgba(219,234,254,.72);
  color:#1e3a5f;
  font-size:13px;
  font-weight:700;
  line-height:1.7;
}
.demo-login-hint-title {
  margin-bottom:2px;
  color:#1d4ed8;
  font-weight:900;
}
.demo-login-hint code {
  display:inline-block;
  margin-left:4px;
  padding:1px 7px;
  border-radius:999px;
  background:#fff;
  color:#1d4ed8;
  font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size:12px;
  font-weight:900;
}
.demo-login-button {
  width:auto !important;
  min-height:34px !important;
  margin:9px 0 0 !important;
  padding:8px 13px !important;
  border-radius:999px !important;
  font-size:13px !important;
  letter-spacing:0 !important;
}
.partner-info {
  border:1px solid rgba(59,130,246,.2);
  border-radius:20px;
  background:linear-gradient(135deg, rgba(219,234,254,.72), rgba(241,244,248,.86));
  color:var(--hist-muted);
  line-height:1.7;
}
.partner-info b { color:var(--hist-deep); }
.summary {
  gap:12px;
}
.summary > div {
  position:relative;
  overflow:hidden;
  border:1px solid rgba(29,78,216,.14);
  border-radius:20px;
  background:rgba(255,255,255,.82);
  color:var(--hist-muted);
  font-weight:800;
}
.summary > div::after {
  content:'';
  position:absolute;
  width:86px;
  height:86px;
  right:-42px;
  top:-48px;
  border-radius:999px;
  background:rgba(59,130,246,.15);
}
.summary b {
  color:var(--hist-deep);
  font-size:24px;
}
.history-tools {
  display:flex;
  gap:8px;
  margin-bottom:12px;
}
.logout-btn {
  width:auto !important;
  padding:10px 15px !important;
  white-space:nowrap;
}
.order-item {
  position:relative;
  overflow:hidden;
  margin-bottom:12px;
  padding:16px 18px;
  border:1px solid var(--hist-line);
  border-left:0;
  border-radius:20px;
  background:rgba(255,255,255,.9);
  box-shadow:0 12px 30px rgba(29,78,216,.08);
}
.order-item::before {
  content:'';
  position:absolute;
  inset:0 auto 0 0;
  width:5px;
  background:linear-gradient(180deg, var(--hist-citrus), var(--hist-fresh), var(--hist-sky));
}
.order-item .date {
  color:var(--hist-sky);
  font-size:12px;
  letter-spacing:.06em;
}
.order-item .name {
  color:var(--hist-ink);
  font-size:17px;
}
.order-item .detail {
  color:#53665b;
  line-height:1.75;
}
.order-item .actions {
  gap:8px;
  margin-top:12px;
}
.order-item a {
  border-radius:999px;
  background:linear-gradient(135deg, var(--hist-deep), #3b82f6);
  box-shadow:0 8px 18px rgba(29,78,216,.16);
}
.order-item a.delivery {
  background:linear-gradient(135deg, var(--hist-deep), var(--hist-leaf));
}
.order-item a.disabled {
  background:#c8d0ca;
  box-shadow:none;
}
.empty {
  border:1px dashed rgba(29,78,216,.18);
  border-radius:20px;
  background:rgba(255,255,255,.62);
  color:var(--hist-muted);
}
.err { color:#b42318; line-height:1.6; }
.ok { color:var(--hist-deep); line-height:1.6; }
.hidden { display:none !important; }
@media (max-width:640px) {
  .history-hero { border-radius:24px; }
  .summary { flex-direction:column; }
  .history-tools { flex-direction:column; }
  .logout-btn { width:100% !important; }
}
</style>
</head>
<body>
<div style="position:sticky;top:0;z-index:99;padding:8px 16px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);font-size:12px;display:flex;justify-content:space-between;align-items:center">
  <a href="../../" data-site-root style="color:#1d4ed8;text-decoration:none;font-weight:700">Back to Top</a>
  <span style="color:#94a3b8">Sample Data</span>
</div>
<div class="wrap">
  <header class="history-hero">
    <div class="eyebrow">Order History</div>
    <h1>依頼履歴</h1>
    <p class="hero-copy">過去の依頼内容、依頼書PDF、確認書を取引先ごとに確認できます。</p>
  </header>

  <!-- ログイン -->
  <div id="loginBox" class="card">
    <label>パスワード</label>
    <input type="password" id="pw" placeholder="配布されたパスワードを入力">
    <label>ご登録メールアドレス</label>
    <input type="email" id="email" placeholder="demo@example.invalid">
    <div class="demo-login-hint">
      <div class="demo-login-hint-title">デモ用ログイン情報</div>
      <div>パスワード:<code>demo</code></div>
      <div>履歴メール:<code>demo-a@example.invalid</code></div>
      <button class="demo-login-button" type="button" onclick="demoLogin()">デモでログイン</button>
    </div>
    <div style="height:10px"></div>
    <button onclick="login()">履歴を表示</button>
    <div id="loginErr" class="err"></div>
    <div class="help-note">
      ※ メールアドレスは事前に運営側で登録が必要です。<br>
      未登録の場合は運営窓口までご連絡ください。
    </div>
  </div>

  <!-- 履歴表示 -->
  <div id="historyBox" class="hidden">
    <div class="partner-info" id="partnerInfo"></div>

    <div class="summary">
      <div>総依頼件数<b id="sumCount">0</b></div>
      <div>総成果<b id="sumTotal">¥0</b></div>
    </div>

    <div class="history-tools">
      <input type="text" id="searchBox" placeholder="🔍 件名・商品で絞り込み" oninput="renderList()">
      <button onclick="logout()" class="secondary logout-btn">ログアウト</button>
    </div>

    <div id="listBox"></div>
  </div>
</div>

<script>
(function(){
  var marker = '/demos/order_system/';
  var path = window.location.pathname;
  var index = path.indexOf(marker);
  var base = index >= 0 ? path.slice(0, index + marker.length) : './';
  window.orderSystemPath = function(file){ return base + file; };
  document.write('<script src="' + base + 'mock-api.js?v=20260528-loader"><\/script>');
})();
</script>
<script>
let PW='';
let EMAIL='';
let DATA=[];
let PARTNER=null;

function demoLogin(){
  document.getElementById('pw').value = 'demo';
  document.getElementById('email').value = 'demo-a@example.invalid';
  login();
}

function hasDemoApi(){
  return window.google && window.google.script && window.google.script.run;
}

function login(){
  PW = document.getElementById('pw').value;
  EMAIL = document.getElementById('email').value.trim();
  if (!PW || !EMAIL) {
    document.getElementById('loginErr').textContent = 'パスワードとメールアドレスの両方を入力してください';
    return;
  }
  if (!hasDemoApi()) {
    document.getElementById('loginErr').textContent = 'デモAPIを読み込めませんでした。ページを再読み込みしてください。';
    return;
  }
  document.getElementById('loginErr').textContent = '読み込み中...';
  window.google.script.run
    .withSuccessHandler(onHistory)
    .withFailureHandler(e=>document.getElementById('loginErr').textContent='エラー: '+e.message)
    .getPartnerHistory(PW, EMAIL);
}

function onHistory(res){
  if (!res.ok) {
    document.getElementById('loginErr').textContent = res.error || '認証エラー';
    return;
  }
  DATA = res.data || [];
  PARTNER = res.partner;
  document.getElementById('loginErr').textContent = '';
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('historyBox').classList.remove('hidden');
  document.getElementById('partnerInfo').innerHTML =
    '<b>' + esc(PARTNER.company) + '</b>'
    + (PARTNER.contact ? ' / ' + esc(PARTNER.contact) + ' 様' : '')
    + '<br><span style="font-size:12px; color:#555;">' + esc(PARTNER.email) + '</span>';
  renderList();
}

function renderList(){
  const keyword = document.getElementById('searchBox').value.toLowerCase();
  const filtered = DATA.filter(o=>{
    if (o.status==='キャンセル') return false;
    if (keyword && !(o.clientName||'').toLowerCase().includes(keyword)
               && !(o.crop||'').toLowerCase().includes(keyword)) return false;
    return true;
  });

  let total = 0;
  filtered.forEach(o=> total += Number(o.amount)||0);
  document.getElementById('sumCount').textContent = filtered.length;
  document.getElementById('sumTotal').textContent = '¥' + total.toLocaleString();

  const box = document.getElementById('listBox');
  if (filtered.length===0) {
    box.innerHTML = '<div class="empty">該当する依頼がありません</div>';
    return;
  }
  box.innerHTML = filtered.map(o=>{
    const pdfBtn = o.orderFileUrl
      ? `<a href="${o.orderFileUrl}" target="_blank">📄 依頼書PDF</a>`
      : '<a class="disabled">📄 PDF未発行</a>';
    const delBtn = o.deliveryFileUrl
      ? `<a class="delivery" href="${o.deliveryFileUrl}" target="_blank">📨 確認書</a>`
      : '';
    return `
      <div class="order-item">
        <div class="date">${o.eventDate || '日時未定'}</div>
        <div class="name">${esc(o.clientName)}</div>
        <div class="detail">
          ${esc(o.crop)}（${esc(o.style)}）/ ${o.qty||0}セット / ${o.pieces||0}明細<br>
          金額（税込）: <b>¥${(Number(o.amount)||0).toLocaleString()}</b><br>
          ${o.loadTime ? '積込: ' + esc(o.loadTime) : ''}
          ${o.unloadTime ? ' / 荷下ろし: ' + esc(o.unloadTime) : ''}
          ${o.note ? '<br>備考: ' + esc(o.note) : ''}
        </div>
        <div class="actions">${pdfBtn} ${delBtn}</div>
      </div>
    `;
  }).join('');
}

function logout(){
  PW=''; EMAIL=''; DATA=[]; PARTNER=null;
  document.getElementById('pw').value='';
  document.getElementById('email').value='';
  document.getElementById('historyBox').classList.add('hidden');
  document.getElementById('loginBox').classList.remove('hidden');
  document.getElementById('loginErr').textContent='';
}

function esc(s){
  return (s==null?'':String(s)).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
}
</script>
</body>
</html>
