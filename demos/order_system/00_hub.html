<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order System Hub | Web Application Samples</title>
<style>
* { box-sizing: border-box; }
body {
  min-height: 100vh;
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  color: #1a2332;
  background:
    radial-gradient(circle at 12% 8%, rgba(59,130,246,.12), transparent 28rem),
    radial-gradient(circle at 88% 6%, rgba(29,78,216,.1), transparent 30rem),
    linear-gradient(135deg, #f1f4f8 0%, #e8eef6 50%, #edf1f8 100%);
}
.back-bar {
  position: sticky;
  top: 0;
  z-index: 99;
  padding: 8px 16px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,.06);
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.back-bar a {
  color: #1d4ed8;
  text-decoration: none;
  font-weight: 700;
}
.back-bar span {
  color: #94a3b8;
}
.wrap {
  width: min(1040px, calc(100% - 32px));
  margin: 0 auto;
  padding: 34px 0 60px;
}
.hero {
  position: relative;
  overflow: hidden;
  padding: clamp(26px, 5vw, 44px);
  border: 1px solid rgba(255,255,255,.74);
  border-radius: 30px;
  background: linear-gradient(135deg, rgba(29,78,216,.96), rgba(59,130,246,.9));
  color: #fff;
  box-shadow: 0 22px 60px rgba(29,78,216,.14);
}
.hero::after {
  content: '';
  position: absolute;
  width: 220px;
  height: 220px;
  right: -80px;
  bottom: -120px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(96,165,250,.54), transparent 68%);
}
.eyebrow {
  position: relative;
  z-index: 1;
  display: inline-flex;
  margin-bottom: 12px;
  padding: 7px 12px;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 999px;
  background: rgba(255,255,255,.12);
  color: #dbeafe;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .12em;
}
h1 {
  position: relative;
  z-index: 1;
  margin: 0;
  font-size: clamp(32px, 7vw, 54px);
  line-height: 1.06;
}
.copy {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 14px 0 0;
  color: rgba(255,255,255,.82);
  font-size: 15px;
  line-height: 1.8;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin-top: 18px;
}
.card {
  display: flex;
  min-height: 190px;
  flex-direction: column;
  justify-content: space-between;
  padding: 22px;
  border: 1px solid rgba(29,78,216,.12);
  border-radius: 20px;
  background: rgba(255,255,255,.88);
  box-shadow: 0 14px 36px rgba(29,78,216,.08);
  color: inherit;
  text-decoration: none;
  transition: box-shadow .2s, transform .2s;
}
.card:hover {
  box-shadow: 0 18px 44px rgba(29,78,216,.14);
  transform: translateY(-2px);
}
.label {
  display: inline-flex;
  align-self: flex-start;
  margin-bottom: 14px;
  padding: 6px 10px;
  border-radius: 999px;
  background: #dbeafe;
  color: #1d4ed8;
  font-size: 12px;
  font-weight: 900;
}
.card strong {
  display: block;
  color: #1d4ed8;
  font-size: 23px;
}
.card span {
  display: block;
  margin-top: 8px;
  color: #5d6b82;
  font-size: 13px;
  line-height: 1.7;
}
.go {
  align-self: flex-start;
  margin-top: 18px;
  padding: 9px 13px;
  border-radius: 999px;
  background: #1d4ed8;
  color: #fff;
  font-size: 13px;
  font-weight: 800;
}
.note {
  margin-top: 16px;
  padding: 14px 16px;
  border: 1px solid rgba(29,78,216,.12);
  border-radius: 16px;
  background: rgba(255,255,255,.7);
  color: #5d6b82;
  font-size: 13px;
  line-height: 1.7;
}
.note b { color: #1d4ed8; }
@media (max-width: 760px) {
  .grid { grid-template-columns: 1fr; }
  .hero { border-radius: 24px; }
}
</style>
</head>
<body>
<div class="back-bar">
  <a href="../../" data-site-root>Back to Top</a>
  <span>Sample Data</span>
</div>
<div class="wrap">
  <section class="hero">
    <div class="eyebrow">SAMPLE HUB</div>
    <h1>Order System Hub</h1>
    <p class="copy">管理者、入力、履歴の各インターフェースを確認するための入口です。</p>
  </section>

  <main class="grid">
    <a class="card" href="05_admin.html" data-order-file="05_admin.html">
      <div>
        <div class="label">ADMIN</div>
        <strong>管理者</strong>
        <span>依頼一覧、編集、チーム決定、マスタ編集。</span>
      </div>
      <div class="go">Open</div>
    </a>
    <a class="card" href="04_index.html" data-order-file="04_index.html">
      <div>
        <div class="label">ORDER</div>
        <strong>入力</strong>
        <span>取引先が依頼を登録する入力フォーム。</span>
      </div>
      <div class="go">Open</div>
    </a>
    <a class="card" href="06_history.html" data-order-file="06_history.html">
      <div>
        <div class="label">HISTORY</div>
        <strong>履歴</strong>
        <span>取引先ごとの依頼履歴と書類リンク。</span>
      </div>
      <div class="go">Open</div>
    </a>
  </main>

  <div class="note">
    Sample login: password <b>demo</b>, history email <b>demo-a@example.invalid</b>. Data is stored in browser localStorage.
  </div>
</div>
<script>
(function(){
  var marker = '/demos/order_system/';
  var path = window.location.pathname;
  var index = path.indexOf(marker);
  var base = index >= 0 ? path.slice(0, index + marker.length) : './';
  window.orderSystemPath = function(file){ return base + file; };
  document.write('<script src="' + base + 'mock-api.js?v=20260528-loader"><\/script>');
})();
</script>
</body>
</html>
