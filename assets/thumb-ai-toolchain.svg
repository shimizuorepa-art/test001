<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">AI活用と外部ツール連携のサムネイル</title>
  <desc id="desc">Notion、タスク同期、Illustrator、画像編集、MCP/Codexをつないだ業務プロトタイプの図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081526"/>
      <stop offset="0.48" stop-color="#0f2f42"/>
      <stop offset="1" stop-color="#14112a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18324a"/>
      <stop offset="1" stop-color="#0d1c2c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.78 0 0 0 0 0.55 0 0 0 0.9 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg)"/>
  <path d="M90 116h720M90 260h720M90 404h720M174 70v380M450 70v380M726 70v380" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="450" cy="260" r="86" fill="#14c78d" fill-opacity="0.12" stroke="#14c78d" stroke-width="2" filter="url(#glow)"/>
  <circle cx="450" cy="260" r="48" fill="#14c78d"/>
  <text x="450" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#04111d">AI</text>
  <text x="450" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#04111d">Director</text>

  <g fill="none" stroke="#14c78d" stroke-width="4" stroke-linecap="round" stroke-opacity="0.9">
    <path d="M366 260H220"/>
    <path d="M534 260h146"/>
    <path d="M410 190 282 128"/>
    <path d="M490 190 618 128"/>
    <path d="M410 330 282 392"/>
    <path d="M490 330 618 392"/>
  </g>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(72 218)">
      <rect width="190" height="84" rx="18" fill="url(#card)" stroke="#14c78d" stroke-opacity="0.55"/>
      <text x="28" y="35" font-size="18" font-weight="800" fill="#f7fbff">Notion DB</text>
      <text x="28" y="61" font-size="13" fill="#a7b7c7">簡易DB・タスク同期</text>
    </g>
    <g transform="translate(210 76)">
      <rect width="190" height="84" rx="18" fill="url(#card)" stroke="#5de0ff" stroke-opacity="0.5"/>
      <text x="28" y="35" font-size="18" font-weight="800" fill="#f7fbff">Coding</text>
      <text x="28" y="61" font-size="13" fill="#a7b7c7">Web・アプリ試作</text>
    </g>
    <g transform="translate(500 76)">
      <rect width="190" height="84" rx="18" fill="url(#card)" stroke="#f6b84b" stroke-opacity="0.55"/>
      <text x="28" y="35" font-size="18" font-weight="800" fill="#f7fbff">Illustrator</text>
      <text x="28" y="61" font-size="13" fill="#a7b7c7">販促素材連携</text>
    </g>
    <g transform="translate(638 218)">
      <rect width="190" height="84" rx="18" fill="url(#card)" stroke="#14c78d" stroke-opacity="0.55"/>
      <text x="28" y="35" font-size="18" font-weight="800" fill="#f7fbff">MCP/Codex</text>
      <text x="28" y="61" font-size="13" fill="#a7b7c7">外部ツール接続</text>
    </g>
    <g transform="translate(210 360)">
      <rect width="190" height="84" rx="18" fill="url(#card)" stroke="#ff6b8a" stroke-opacity="0.55"/>
      <text x="28" y="35" font-size="18" font-weight="800" fill="#f7fbff">Image Edit</text>
      <text x="28" y="61" font-size="13" fill="#a7b7c7">表紙・素材調整</text>
    </g>
    <g transform="translate(500 360)">
      <rect width="190" height="84" rx="18" fill="url(#card)" stroke="#5de0ff" stroke-opacity="0.5"/>
      <text x="28" y="35" font-size="18" font-weight="800" fill="#f7fbff">Prototype</text>
      <text x="28" y="61" font-size="13" fill="#a7b7c7">業務で試せる形へ</text>
    </g>
