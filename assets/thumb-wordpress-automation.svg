<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">WordPress運用と記事投稿自動化のサムネイル</title>
  <desc id="desc">Cocoonテーマ、ブログ執筆、MCP/Codexによる自動投稿を表した図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#102c45"/>
      <stop offset="1" stop-color="#11182d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#dce8f2"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg)"/>
  <path d="M68 422c120-120 232-152 362-112s248 24 402-112" fill="none" stroke="#14c78d" stroke-opacity="0.12" stroke-width="86"/>

  <g transform="translate(82 80)">
    <rect width="500" height="342" rx="24" fill="url(#panel)" filter="drop-shadow(0 24px 34px rgba(0,0,0,.42))"/>
    <rect width="500" height="58" rx="24" fill="#1f6f95"/>
    <text x="34" y="38" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" fill="#fff">WordPress Admin</text>
    <rect x="34" y="92" width="108" height="108" rx="54" fill="#21759b"/>
    <text x="88" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="74" font-weight="900" fill="#fff">W</text>
    <rect x="174" y="96" width="246" height="22" rx="11" fill="#11243a"/>
    <rect x="174" y="136" width="190" height="14" rx="7" fill="#11243a" fill-opacity="0.45"/>
    <rect x="174" y="164" width="226" height="14" rx="7" fill="#11243a" fill-opacity="0.28"/>
    <rect x="34" y="240" width="432" height="62" rx="14" fill="#eaf1f7"/>
    <text x="58" y="278" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="900" fill="#11243a">Cocoon theme / Blog writing</text>
  </g>

  <g transform="translate(560 132)" font-family="Inter, system-ui, sans-serif">
    <rect width="250" height="260" rx="28" fill="#0d1c2c" stroke="#14c78d" stroke-opacity="0.65" filter="drop-shadow(0 20px 30px rgba(0,0,0,.35))"/>
    <circle cx="125" cy="80" r="48" fill="#14c78d"/>
    <text x="125" y="75" text-anchor="middle" font-size="20" font-weight="900" fill="#04111d">Codex</text>
    <text x="125" y="102" text-anchor="middle" font-size="13" font-weight="900" fill="#04111d">MCP</text>
    <path d="M76 154h98M76 188h98M76 222h98" stroke="#a7b7c7" stroke-width="12" stroke-linecap="round"/>
    <path d="M36 154h18M36 188h18M36 222h18" stroke="#14c78d" stroke-width="12" stroke-linecap="round"/>
  </g>

  <path d="M492 250h106" stroke="#14c78d" stroke-width="8" stroke-linecap="round"/>
  <path d="m584 226 30 24-30 24" fill="none" stroke="#14c78d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="450" y="470" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#f7fbff">Automatic Article Publishing</text>
</svg>
